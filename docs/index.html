<!DOCTYPE html>
<html>
  <head>
    <title>EZ Vault</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://44billion.github.io/ez-vault" />
    <link href="./styles/reset.css" rel="stylesheet" />
    <link href="./styles/global.css" rel="stylesheet" />
    <link href="./styles/index.css" rel="stylesheet" />
  </head>
  <body>
    <div id="vault">
      <section class="accounts-section">
        <div class="accounts-header">
          <div class="accounts-actions">
            <button id="create-account-btn" type="button" class="primary-action">
              <span class="glyph"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l0 14" /><path d="M5 12l14 0" /></svg></span>
              <span>New Account</span>
            </button>
            <button id="add-account-btn" type="button" class="primary-action">
              <span class="glyph"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l0 14" /><path d="M16 15l-4 4" /><path d="M8 15l4 4" /></svg></span>
              <span class="text-full">Add Account</span>
              <span class="text-short">Add</span>
            </button>
            <button id="sync-devices-btn" type="button" class="primary-action">
              <span class="glyph"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 9a1 1 0 0 1 1 -1h6a1 1 0 0 1 1 1v10a1 1 0 0 1 -1 1h-6a1 1 0 0 1 -1 -1v-10z" /><path d="M18 8v-3a1 1 0 0 0 -1 -1h-13a1 1 0 0 0 -1 1v12a1 1 0 0 0 1 1h9" /><path d="M16 9h2" /></svg></span>
              <span class="text-full">Sync Devices</span>
              <span class="text-short">Sync</span>
            </button>
          </div>
          <account-add></account-add>
          <sync-panel></sync-panel>
        </div>
        <account-list class="accounts-list"></account-list>
      </section>
      <section class="diagnostics-section">
        <accordion-panel header="Activity log" icon="activity">
          <activity-log></activity-log>
        </accordion-panel>
      </section>
    </div>
    <lock-overlay hidden></lock-overlay>
  </body>
  <script type="importmap">
  {
    "imports": {
      "jsqr": "https://esm.sh/jsqr@1.4.0",
      "@noble/ciphers/chacha.js": "https://esm.sh/@noble/ciphers@2.2.0/chacha.js",
      "@noble/curves/secp256k1.js": "https://esm.sh/@noble/curves@2.2.0/secp256k1.js",
      "@noble/hashes/hkdf.js": "https://esm.sh/@noble/hashes@2.2.0/hkdf.js",
      "@noble/hashes/hmac.js": "https://esm.sh/@noble/hashes@2.2.0/hmac.js",
      "@noble/hashes/sha2.js": "https://esm.sh/@noble/hashes@2.2.0/sha2.js",
      "@noble/hashes/utils.js": "https://esm.sh/@noble/hashes@2.2.0/utils.js",
      "nostr-tools": "https://esm.sh/nostr-tools@2.23.5",
      "nostr-tools/": "https://esm.sh/nostr-tools@2.23.5/",
      "qrcode-generator": "https://esm.sh/qrcode-generator@1.4.4"
    }
  }
  </script>
  <script src="./pre-paint.js"></script>
  <script type="module">
    import './index.js'
  </script>
</html>
